        <strong>Location:</strong> Riverside Community Hall, 456 Green St</p>

        <p>Passionate about the environment? Join us for our monthly Eco-Committee Meetup at Riverside Community Hall, where we gather to discuss and collaborate on current environmental projects and initiatives in Windy City Community College.</p>

        <h3>What to Expect</h3>
        <p>At our Eco-Committee Meetups, we:</p>
        <ul>
          <li>Share updates on ongoing environmental projects and campaigns</li>
          <li>Brainstorm ideas for new initiatives to promote sustainability in our community</li>
          <li>Discuss ways to address environmental challenges and advocate for positive change</li>
          <li>Network and connect with like-minded individuals who share a passion for environmental conservation</li>
        </ul>

        <h3>Get Involved</h3>
        <p>Whether you’re an environmental expert or just getting started on your sustainability journey, everyone is welcome to join the Eco-Committee Meetup. Your ideas, input, and enthusiasm are valuable contributions to our efforts to create a greener, healthier future for Windy City Community College.</p>

        <h3>Join Us!</h3>
        <p>Don’t miss out on this opportunity to make a difference in your community and protect the planet for future generations. For more information, contact [Eco-Committee Contact Person] at (555) 789-0123 or visit our website at [Eco-Committee Website].</p>
