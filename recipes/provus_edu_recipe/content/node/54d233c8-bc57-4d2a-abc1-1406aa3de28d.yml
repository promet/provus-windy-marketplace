      value: |
        <strong>Location:</strong> The Jazz Corner, 789 Melody Ave</p>

        <p>Indulge your senses and immerse yourself in the smooth sounds of live jazz music at The Jazz Corner! Join us on the last Friday of every month for an unforgettable evening of soulful melodies, captivating rhythms, and electrifying performances by both local and visiting jazz artists.</p>

        <h3>What to Expect</h3>
        <p>Our Live Jazz Night features:</p>
        <ul>
          <li>Live performances by talented jazz musicians and bands</li>
          <li>An intimate and inviting atmosphere perfect for enjoying great music</li>
          <li>A diverse repertoire of jazz styles, from classic standards to contemporary improvisations</li>
          <li>Opportunities to mingle with fellow jazz enthusiasts and musicians</li>
        </ul>

        <h3>Featured Artists</h3>
        <p>Each month, we showcase a lineup of exceptional jazz talent. From seasoned professionals to emerging artists, our performers promise to deliver an unforgettable night of music and entertainment. Check our website or social media pages for updates on the upcoming lineup.</p>

        <h3>Admission and Reservations</h3>
        <p>Admission to Live Jazz Night is [free/$XX per person], and reservations are highly recommended to secure your spot. To reserve a table or for more information, please contact The Jazz Corner at (555) 123-4567 or visit our website at [Jazz Corner's Website].</p>

        <p>Come experience the magic of live jazz music at The Jazz Corner. Whether you're a seasoned jazz aficionado or new to the genre, you're sure to be swept away by the enchanting melodies and infectious rhythms. See you on the dance floor!</p>
