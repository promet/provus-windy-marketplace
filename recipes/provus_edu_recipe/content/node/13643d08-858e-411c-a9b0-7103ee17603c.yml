      value: |
        <strong>Time:</strong> Starts at dusk<br>
        <strong>Location:</strong> Riverside Park</p>

        <p>Gather your family, grab a blanket, and head over to Riverside Park every Friday evening for our Family Movie Night series! This free event is the perfect way to relax and enjoy a blockbuster hit under the stars with fellow community members.</p>

        <h3>Featured Films</h3>
        <p>Our lineup includes a mix of family-friendly classics and new releases, ensuring there’s something to delight movie-goers of all ages. Upcoming features include:</p>
        <ul>
          <li>July 7th: "Finding Nemo" - an underwater adventure that's fun for the whole family.</li>
          <li>July 14th: "Back to the Future" - travel through time in this unforgettable sci-fi classic.</li>
          <li>July 21st: "The Incredibles" - join this superhero family on a thrilling action-packed journey.</li>
        </ul>

        <h3>What to Bring</h3>
        <p>Be sure to pack your picnic blankets, lawn chairs, and favorite snacks. Popcorn and refreshments will be available for purchase from local vendors, but you’re welcome to bring your own picnic basket filled with goodies.</p>

        <h3>Weather Policy</h3>
        <p>Family Movie Night is a weather-dependent event. In case of rain, the movie will be rescheduled for the following evening. Stay updated by checking our website or subscribing to event alerts.</p>

        <p>Family Movie Night at the Park is more than just watching a film; it's an experience that brings our community together. We look forward to seeing you and your family there for a night of fun and relaxation!</p>

        <p>For more details on the movie schedule and other inquiries, please visit [Windy City Community College's Official Website] or contact the Parks and Recreation Department at (555) 987-6543.</p>
