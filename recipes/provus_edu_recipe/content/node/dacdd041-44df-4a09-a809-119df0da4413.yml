  field_provus_ap_summary:
    -
      value: '<p class="text-align-center">The Marketing major at Windy City Community College requires 60 credit hours to complete, including core business courses, marketing-specific classes, and electives. Below is a sample course sequence:</p><p><strong>Year 1</strong></p><h3><strong>First Semester</strong></h3><p><a href="/academics/general-studies/critical-thinking-and-problem-solving"><strong>Critical Thinking and Problem Solving</strong></a></p><p>Develops analytical reasoning, logical thinking, and problem-solving skills through real-world scenarios and case studies.</p><h3><strong>Second Semester</strong></h3><p><a href="/academics/general-studies/introduction-interdisciplinary-studies"><strong>Introduction to Interdisciplinary Studies</strong></a></p><p>Explores how multiple disciplines interact to address complex societal issues, fostering a broad knowledge base.</p><p><strong>Year 2</strong></p><h3><strong>First Semester</strong></h3><p><a href="/academics/general-studies/global-perspectives-and-cultural-awareness"><strong>Global Perspectives and Cultural Awareness</strong></a></p><p>Examines global cultures, traditions, and social issues to promote cross-cultural understanding and awareness.</p><h3><strong>Second Semester</strong></h3><p><a href="/academics/general-studies/ethics-and-social-responsibility"><strong>Ethics and Social Responsibility</strong></a></p><p>Focuses on ethical decision-making, civic engagement, and the impact of social responsibility in various fields.</p>'
      format: content_format
