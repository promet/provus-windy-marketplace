  field_provus_ap_summary:
    -
      value: '<p class="text-align-center">The Marketing major at Windy City Community College requires 60 credit hours to complete, including core business courses, marketing-specific classes, and electives. Below is a sample course sequence:</p><p><strong>Year 1</strong></p><h3><strong>First Semester</strong></h3><p><a href="/academics/information-technology-major/introduction-computing"><strong>Introduction to Computing</strong></a></p><p>Covers fundamental computing concepts, programming basics, and problem-solving techniques.</p><p><a href="/academics/information-technology-major/programming-fundamentals"><strong>Programming Fundamentals</strong></a></p><p>Introduction to programming logic, syntax, and algorithms using a high-level language.</p><p><strong>Year 2</strong></p><h3><strong>First Semester</strong></h3><p><a href="/academics/information-technology-major/data-structures-and-algorithms"><strong>Data Structures and Algorithms</strong></a></p><p>Explores efficient data organization, searching, sorting, and algorithm design.</p><h3><strong>Second Semester</strong></h3><p><a href="/academics/information-technology-major/database-management-systems"><strong>Database Management Systems</strong></a></p><p>Introduction to database concepts, SQL, and relational database management.</p><p><strong>Year 3</strong></p><h3><strong>First Semester</strong></h3><p><a href="/academics/information-technology-major/operating-systems"><strong>Operating Systems</strong></a></p><p>Covers OS principles, process management, memory management, and file systems.</p><p><a href="/academics/information-technology-major/computer-networks"><strong>Computer Networks</strong></a></p><p>Explores network protocols, architecture, and security principles.</p><h3><strong>Second Semester</strong></h3><p><a href="/academics/information-technology-major/software-engineering"><strong>Software Engineering</strong></a></p><p>Covers software development methodologies, project management, and design principles.</p><p><a href="/academics/information-technology-major/cybersecurity"><strong>Cybersecurity</strong></a></p><p>Focuses on protecting information systems, ethical hacking, and cybersecurity strategies.</p><p><strong>Year 4</strong></p><h3><strong>First Semester</strong></h3><p><a href="/academics/information-technology-major/artificial-intelligence"><strong>Artificial Intelligence</strong></a></p><p>Introduction to AI concepts, machine learning, and neural networks.</p><h3><strong>Second Semester</strong></h3><p><a href="/academics/information-technology-major/capstone-project"><strong>Capstone Project</strong></a></p><p>Students apply their knowledge to develop a real-world computing solution.</p>'
