        <strong>Location:</strong> Community Center, 456 Community Drive</p>

        <p>Calling all seniors of Windy City Community College! You are invited to join us every Wednesday morning for our Senior Citizens' Social Hour at the Community Center. It’s a wonderful hour filled with warmth, laughter, and good company—perfect for making new friends and enjoying pleasant conversations over coffee and cakes.</p>

        <h3>What We Offer</h3>
        <p>Our Social Hour is designed to provide a relaxed and welcoming atmosphere where you can:</p>
        <ul>
          <li>Enjoy complimentary coffee, tea, and a selection of cakes and cookies.</li>
          <li>Engage in casual conversations and share stories with peers.</li>
          <li>Participate in light, fun activities such as card games and trivia quizzes.</li>
          <li>Receive information on resources available to seniors in the community.</li>
        </ul>

        <h3>Benefits of Attending</h3>
        <p>Social interaction is crucial at every stage of life, and perhaps even more so for seniors. Attending the Social Hour can help improve your mental health, keep your mind active, and boost your mood. It's also a great opportunity to stay connected with the community and keep abreast of what’s happening around town.</p>

        <h3>No Registration Required</h3>
        <p>There's no need to register—just show up! This event is free of charge, thanks to the support from local sponsors and volunteers. If you require transportation assistance, please contact the Community Center a day in advance at (555) 789-0123, and we will be happy to help arrange it for you.</p>
