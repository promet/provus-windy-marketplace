  field_provus_ap_summary:
    -
      value: '<p class="text-align-center">The Marketing major at Windy City Community College requires 60 credit hours to complete, including core business courses, marketing-specific classes, and electives. Below is a sample course sequence:</p><p>Open configuration options</p><p><strong>Year 1: Foundations</strong></p><h3><strong>Fall Semester</strong></h3><p><a href="/academics/marketing-major-bs/introduction-business-3-credits"><strong>Introduction to Business (3 credits)</strong></a></p><p>Overview of business concepts, including entrepreneurship, management, finance, marketing, and operations in today''s global economy.</p><p><a href="/academics/marketing-major-bs/composition-i-3-credits"><strong>Composition I (3 credits)</strong></a></p><p>Focuses on writing clarity, structure, and argument development through essays and research-based assignments.</p><p><a href="/academics/marketing-major-bs/college-algebra-3-credits"><strong>College Algebra (3 credits)</strong></a></p><p>Covers fundamental algebraic concepts including equations, inequalities, functions, and graphing.</p><p><a href="/academics/marketing-major-bs/intro-computer-applications-3-credits"><strong>Intro to Computer Applications (3 credits)</strong></a></p><p>Introduction to essential software applications such as word processing, spreadsheets, presentations, and database management.</p><p><a href="/academics/marketing-major-bs/principles-marketing-3-credits"><strong>Principles of Marketing (3 credits)</strong></a></p><p>Introduction to marketing concepts, strategies, and consumer behavior. Covers branding, pricing, distribution, and promotional techniques.</p><h3><strong>Spring Semester</strong></h3><p><a href="/academics/marketing-major-bs/consumer-behavior-3-credits"><strong>Consumer Behavior (3 credits)</strong></a></p><p>Examines psychological, social, and cultural factors that influence consumer decision-making.</p><p><a href="/academics/marketing-major-bs/business-communication-3-credits"><strong>Business Communication (3 credits)</strong></a></p><p>Develops written and verbal communication skills for professional business environments.</p><p><a href="/academics/marketing-major-bs/composition-ii-3-credits"><strong>Composition II (3 credits)</strong></a></p><p>Advanced writing course focusing on research, analysis, and argumentative essays.</p><p><a href="/academics/marketing-major-bs/public-speaking-3-credits"><strong>Public Speaking (3 credits)</strong></a></p><p>Teaches effective speech delivery, audience engagement, and persuasive communication techniques.</p><p><strong>Year 2: Core Business Skills</strong></p><h3><strong>Fall Semester</strong></h3><p><a href="/academics/marketing-major-bs/graphic-design-marketing-3-credits"><strong>Graphic Design for Marketing (3 credits)</strong></a></p><p>Focuses on visual communication principles and design tools for marketing materials.</p><p><a href="/academics/marketing-major-bs/elective-3-credits"><strong>Elective (3 credits)</strong></a></p><p>A specialized course based on student interest and career goals.</p><p><a href="/academics/marketing-major-bs/principles-management-3-credits"><strong>Principles of Management (3 credits)</strong></a></p><p>Introduction to management theories, leadership, decision-making, and organizational structures.</p><p><a href="/academics/marketing-major-bs/business-statistics-3-credits"><strong>Business Statistics (3 credits)</strong></a></p><p>Introduction to statistical analysis for business applications, including probability, regression, and hypothesis testing.</p><p><a href="/academics/marketing-major-bs/digital-marketing-3-credits"><strong>Digital Marketing (3 credits)</strong></a></p><p>Explores online marketing strategies, SEO, PPC, content marketing, and social media engagement.</p><h3><strong>Spring Semester</strong></h3><p><a href="/academics/marketing-major-bs/advertising-and-promotions-3-credits"><strong>Advertising and Promotions (3 credits)</strong></a></p><p>Covers advertising strategies, campaign planning, and promotional techniques for brand communication.</p><p><a href="/academics/marketing-major-bs/social-media-marketing-3-credits"><strong>Social Media Marketing (3 credits)</strong></a></p><p>Explores social media platforms, engagement strategies, and analytics for brand growth.</p><p><a href="/academics/marketing-major-bs/financial-accounting-3-credits"><strong>Financial Accounting (3 credits)</strong></a></p><p>Introduction to financial reporting, balance sheets, income statements, and cash flow analysis.</p><p><a href="/academics/marketing-major-bs/organizational-behavior-3-credits"><strong>Organizational Behavior (3 credits)</strong></a></p><p>Examines workplace dynamics, motivation, team behavior, and leadership styles.</p><p><a href="/academics/marketing-major-bs/elective-3-credits-0"><strong>Elective (3 credits)</strong></a></p><p>A specialized course based on student interest and career goals.</p><p><strong>Year 3: Advanced Marketing Concepts</strong></p><h3><strong>Fall Semester</strong></h3><p><a href="/academics/marketing-major-bs/elective-3-credits-1"><strong>Elective (3 credits)</strong></a></p><p>A specialized course based on student interest and career goals.</p><p><a href="/academics/marketing-major-bs/introduction-data-analytics-3-credits"><strong>Introduction to Data Analytics (3 credits)</strong></a></p><p>Covers data analysis techniques, visualization, and decision-making in business.</p><p><a href="/academics/marketing-major-bs/brand-management-3-credits"><strong>Brand Management (3 credits)</strong></a></p><p>Focuses on building, maintaining, and positioning strong brands in competitive markets.</p><p><a href="/academics/marketing-major-bs/business-ethics-3-credits"><strong>Business Ethics (3 credits)</strong></a></p><p>Examines ethical dilemmas, corporate social responsibility, and decision-making frameworks in business.</p><h3><strong>Spring Semester</strong></h3><p><a href="/academics/marketing-major-bs/integrated-marketing-communications-3-credits"><strong>Integrated Marketing Communications (3 credits)</strong></a></p><p>Focuses on aligning messaging across multiple marketing channels for brand consistency.</p><p><a href="/academics/marketing-major-bs/e-commerce-and-digital-strategies-3-credits"><strong>E-Commerce and Digital Strategies (3 credits)</strong></a></p><p>Explores online business models, digital transformation, and e-commerce strategies.</p><p><a href="/academics/marketing-major-bs/sales-and-relationship-management-3-credits"><strong>Sales and Relationship Management (3 credits)</strong></a></p><p>Covers sales techniques, customer relationship strategies, and CRM tools.</p><p><a href="/academics/marketing-major-bs/managerial-accounting-3-credits"><strong>Managerial Accounting (3 credits)</strong></a></p><p>Focuses on cost analysis, budgeting, and financial decision-making for managers.</p><p><a href="/academics/marketing-major-bs/elective-3-credits-2"><strong>Elective (3 credits)</strong></a></p><p>A specialized course based on student interest and career goals.</p><p><strong>Year 4: Specialization and Real-World Application</strong></p><h3><strong>Fall Semester</strong></h3><p><a href="/academics/marketing-major-bs/international-marketing-3-credits"><strong>International Marketing (3 credits)</strong></a></p><p>Examines global marketing strategies, cultural considerations, and international trade policies.</p><p><a href="/academics/marketing-major-bs/capstone-project-proposal-1-credit"><strong>Capstone Project Proposal (1 credit)</strong></a></p><p>Students develop and propose a comprehensive marketing project plan.</p><p><a href="/academics/marketing-major-bs/internship-or-cooperative-education-3-credits"><strong>Internship or Cooperative Education (3 credits)</strong></a></p><p>Provides practical experience in a professional marketing environment.</p><p><a href="/academics/marketing-major-bs/leadership-and-team-management-3-credits"><strong>Leadership and Team Management (3 credits)</strong></a></p><p>Covers leadership theories, team dynamics, and conflict resolution.</p><p><a href="/academics/marketing-major-bs/marketing-strategy-and-planning-3-credits"><strong>Marketing Strategy and Planning (3 credits)</strong></a></p><p>Develops strategic marketing plans based on market analysis and business objectives.</p><h3><strong>Spring Semester</strong></h3><p><a href="/academics/marketing-major-bs/capstone-project-marketing-campaign-3-credits"><strong>Capstone Project: Marketing Campaign (3 credits)</strong></a></p><p>Students execute a real-world marketing campaign using strategic planning.</p><p><a href="/academics/marketing-major-bs/entrepreneurship-and-innovation-3-credits"><strong>Entrepreneurship and Innovation (3 credits)</strong></a></p><p>Covers startup development, business models, and innovative problem-solving.</p><p><a href="/academics/marketing-major-bs/marketing-analytics-and-insights-3-credits"><strong>Marketing Analytics and Insights (3 credits)</strong></a></p><p>Focuses on data-driven marketing decision-making using analytics tools.</p><p><a href="/academics/marketing-major-bs/advanced-topics-marketing-3-credits"><strong>Advanced Topics in Marketing (3 credits)</strong></a></p><p>Explores emerging trends and in-depth marketing concepts.</p><p><a href="/academics/marketing-major-bs/elective-3-credits-3"><strong>Elective (3 credits)</strong></a></p><p>A specialized course based on student interest and career goals.</p>'
