      value: |
        <strong>Location:</strong> Art Center, 789 Craft Ave</p>

        <p>Calling all craft enthusiasts! Join us at the Art Center for our weekly Meridian Crafting Circle—an opportunity to work on your favorite knitting, crochet, or any other craft projects in a friendly and supportive group setting.</p>

        <h3>What to Bring</h3>
        <p>Bring along your current craft project—whether it’s knitting needles, crochet hooks, embroidery hoops, or any other crafting supplies. Don’t forget to bring any materials you may need, such as yarn, fabric, or patterns.</p>

        <h3>Why Join the Crafting Circle?</h3>
        <p>Our Crafting Circle offers:</p>
        <ul>
          <li>A chance to meet fellow crafters, share ideas, and inspire each other</li>
          <li>Opportunities to learn new techniques and improve your skills</li>
          <li>A supportive environment where you can relax, unwind, and indulge in your creative passion</li>
        </ul>

        <h3>All Skill Levels Welcome</h3>
        <p>Whether you’re a beginner or an experienced crafter, everyone is welcome to join the Meridian Crafting Circle. Our members have a range of skills and interests, so there’s always something new to learn and explore.</p>

        <p>Come join us for an afternoon of creativity, camaraderie, and crafting fun! For more information, contact the Art Center at (555) 234-5678 or visit our website at [Art Center's Website].</p>
