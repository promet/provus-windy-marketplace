      uuid: 9b6258b9-d271-415b-b237-196462549917
      component_id: sdc.provus_base_theme.paragraph
      inputs:
        text:
          value: '<table class="table"><thead><tr><th><span style="white-space:pre-wrap;">Title</span></th><th><span style="white-space:pre-wrap;">Per credit hour</span></th><th><span style="white-space:pre-wrap;">Full-time per semester</span></th></tr></thead><tbody><tr><td><span style="white-space:pre-wrap;">In-District Students</span></td><td><span style="white-space:pre-wrap;">$150 per credit hour</span></td><td><span style="white-space:pre-wrap;">Full-time (12+ credit hours): $1,800 per semester</span></td></tr><tr><td><span style="white-space:pre-wrap;">Out-of-District Students</span></td><td><span style="white-space:pre-wrap;">$250 per credit hour</span></td><td><span style="white-space:pre-wrap;">Full-time (12+ credit hours): $3,000 per semester</span></td></tr><tr><td><span style="white-space:pre-wrap;">Title Out-of-State/International Students</span></td><td><span style="white-space:pre-wrap;">$400 per credit hour</span></td><td><span style="white-space:pre-wrap;">Full-time (12+ credit hours): $4,800 per semester</span></td></tr></tbody></table><table class="table"><thead><tr><th colspan="2"><span style="white-space:pre-wrap;">Payment Deadlines</span></th></tr></thead><tbody><tr><td><span style="white-space:pre-wrap;">Spring Semester 2025</span></td><td><span style="white-space:pre-wrap;">January 10, 2025</span></td></tr><tr><td><span style="white-space:pre-wrap;">Summer Semester 2025</span></td><td><span style="white-space:pre-wrap;">May 20, 2025</span></td></tr><tr><td><span style="white-space:pre-wrap;">Fall Semester 2025</span></td><td><span style="white-space:pre-wrap;">August 15, 2025</span></td></tr></tbody></table><p><br><span style="white-space:pre-wrap;">Tuition must be paid in full or arranged through a payment plan by these deadlines to avoid late fees.</span></p>'
          format: canvas_full_html
