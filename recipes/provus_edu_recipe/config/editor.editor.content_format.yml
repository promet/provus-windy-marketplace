langcode: en
status: true
dependencies:
  config:
    - filter.format.content_format
  module:
    - ckeditor5
format: content_format
editor: ckeditor5
settings:
  toolbar:
    items:
      - aickeditor
      - ai_balloon_menu
      - heading
      - bold
      - italic
      - blockQuote
      - link
      - bulletedList
      - numberedList
      - indent
      - outdent
      - alignment
      - insertTable
      - drupalMedia
      - undo
      - redo
      - removeFormat
      - sourceEditing
  plugins:
    ai_ckeditor_ai:
      dialog:
        autoresize: 'min-width: 600px'
        height: '750'
        width: '900'
        dialog_class: ai-ckeditor-modal
      plugins:
        ai_agents_ckeditor:
          agents: {  }
          enabled: false
        ai_automators_ckeditor:
          enabled: false
          workflows: {  }
        ai_ckeditor_completion:
          enabled: true
          provider: anthropic__claude-sonnet-4-5-20250929
        ai_ckeditor_help:
          enabled: false
        ai_ckeditor_modify_prompt:
          enabled: true
          provider: anthropic__claude-sonnet-4-5-20250929
        ai_ckeditor_reformat_html:
          enabled: true
          provider: anthropic__claude-sonnet-4-5-20250929
        ai_ckeditor_spellfix:
          enabled: true
          provider: anthropic__claude-sonnet-4-5-20250929
        ai_ckeditor_summarize:
          enabled: true
          provider: anthropic__claude-sonnet-4-5-20250929
        ai_ckeditor_tone:
          enabled: true
          provider: anthropic__claude-sonnet-4-5-20250929
          autocreate: false
          tone_vocabulary: provus_category_tone
          use_description: true
        ai_ckeditor_translate:
          enabled: false
          provider: anthropic__claude-sonnet-4-5-20250929
          language_source: tax
          autocreate: false
          translate_vocabulary: provus_cat_editorial_section
          use_description: false
    ckeditor5_alignment:
      enabled_alignments:
        - center
        - justify
        - left
        - right
    ckeditor5_heading:
      enabled_headings:
        - heading2
        - heading3
        - heading4
        - heading5
        - heading6
    ckeditor5_list:
      properties:
        reversed: true
        startIndex: true
        styles: false
      multiBlock: true
    ckeditor5_sourceEditing:
      allowed_tags: {  }
    linkit_extension:
      linkit_enabled: true
      linkit_profile: default
    media_media:
      allow_view_mode_override: true
image_upload:
  status: false
