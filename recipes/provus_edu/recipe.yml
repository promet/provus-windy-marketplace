config:
  actions:
    core.date_format.fallback:
      setProperties:
        status: true
        locked: true
        pattern: 'D, j M Y - H:i'
    core.date_format.html_date:
      setProperties:
        status: true
        locked: true
        pattern: Y-m-d
    core.date_format.html_datetime:
      setProperties:
        status: true
        locked: true
        pattern: 'Y-m-d\TH:i:sO'
    core.date_format.html_month:
      setProperties:
        status: true
        locked: true
        pattern: Y-m
    core.date_format.html_time:
      setProperties:
        status: true
        locked: true
        pattern: 'H:i:s'
    core.date_format.html_week:
      setProperties:
        status: true
        locked: true
        pattern: Y-\WW
    core.date_format.html_year:
      setProperties:
        status: true
        locked: true
        pattern: 'Y'
    core.date_format.html_yearless_date:
      setProperties:
        status: true
        locked: true
        pattern: m-d
    core.date_format.long:
      setProperties:
        status: true
        locked: false
        pattern: 'l, j F Y - H:i'
    core.date_format.medium:
      setProperties:
        status: true
        locked: false
        pattern: 'D, j M Y - H:i'
    core.date_format.short:
      setProperties:
        status: true
        locked: false
        pattern: 'j M Y - H:i'
    core.entity_form_mode.user.register:
      setProperties:
        status: true
        targetEntityType: user
        cache: true
    core.entity_view_mode.user.compact:
      setProperties:
        status: true
        targetEntityType: user
        cache: true
    core.entity_view_mode.user.full:
      setProperties:
        status: false
        targetEntityType: user
        cache: true
    core.menu.static_menu_link_overrides:
      simpleConfigUpdate:
        definitions:
          announcements_feed__announcement:
            menu_name: admin
            parent: system.admin
            weight: 10
            expanded: false
            enabled: false
          user__page:
            weight: -48
            menu_name: account
            parent: ''
            enabled: true
            expanded: false
          user__logout:
            weight: -47
            menu_name: account
            parent: ''
            expanded: false
            enabled: true
    system.action.user_block_user_action:
      setProperties:
        status: true
        type: user
        plugin: user_block_user_action
        configuration: {  }
    system.action.user_cancel_user_action:
      setProperties:
        status: true
        type: user
        plugin: user_cancel_user_action
        configuration: {  }
    system.action.user_unblock_user_action:
      setProperties:
        status: true
        type: user
        plugin: user_unblock_user_action
        configuration: {  }
    system.advisories:
      simpleConfigUpdate:
        enabled: true
        interval_hours: 6
    system.cron:
      simpleConfigUpdate:
        threshold:
          requirements_warning: 172800
          requirements_error: 1209600
        logging: true
    system.date:
      simpleConfigUpdate:
        first_day: 0
        country:
          default: null
        timezone:
          default: Asia/Manila
          user:
            configurable: true
            default: 0
            warn: false
    system.diff:
      simpleConfigUpdate:
        context:
          lines_leading: 2
          lines_trailing: 2
    system.feature_flags:
      simpleConfigUpdate:
        linkset_endpoint: false
    system.file:
      simpleConfigUpdate:
        allow_insecure_uploads: false
        default_scheme: public
        temporary_maximum_age: 21600
    system.image.gd:
      simpleConfigUpdate:
        jpeg_quality: 75
    system.image:
      simpleConfigUpdate:
        toolkit: gd
    system.logging:
      simpleConfigUpdate:
        error_level: hide
    system.mail:
      simpleConfigUpdate:
        interface:
          default: php_mail
        mailer_dsn:
          scheme: sendmail
          host: default
          user: null
          password: null
          port: null
          options: {  }
    system.maintenance:
      simpleConfigUpdate:
        langcode: en
        message: '@site is currently under maintenance. We should be back shortly. Thank you for your patience.'
    system.menu.account:
      setProperties:
        status: true
        description: 'Links related to the active user account'
        locked: true
    system.menu.admin:
      setProperties:
        status: true
        description: 'Administrative task links'
        locked: true
    system.menu.footer:
      setProperties:
        status: true
        description: 'Footer Navigation'
        locked: true
    system.menu.main:
      setProperties:
        status: true
        description: 'Site section links'
        locked: true
    system.menu.tools:
      setProperties:
        status: true
        description: 'User tool links, often added by modules'
        locked: true
    system.performance:
      simpleConfigUpdate:
        cache:
          page:
            max_age: 900
        css:
          preprocess: true
          gzip: true
        fast_404:
          enabled: true
          paths: '/\.(?:txt|png|gif|jpe?g|css|js|ico|swf|flv|cgi|bat|pl|dll|exe|asp)$/i'
          exclude_paths: '/\/(?:styles|imagecache)\//'
          html: '<!DOCTYPE html><html><head><title>404 Not Found</title></head><body><h1>Not Found</h1><p>The requested URL "@path" was not found on this server.</p></body></html>'
        js:
          preprocess: true
          gzip: true
