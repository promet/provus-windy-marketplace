  field_provus_ap_summary:
    -
      value: '<p class="text-align-center">The Marketing major at Windy City Community College requires 60 credit hours to complete, including core business courses, marketing-specific classes, and electives. Below is a sample course sequence:</p><p><strong>Year 1</strong></p><h3><strong>First Semester</strong></h3><p><a href="https://windy.provusdemo.com/academics/master-science-information-technology/advanced-database-systems"><strong>Advanced Database Systems</strong></a></p><p>Covers database optimization, NoSQL, and big data management.</p><h3><strong>Second Semester</strong></h3><p><a href="https://windy.provusdemo.com/academics/master-science-information-technology/machine-learning"><strong>Machine Learning</strong></a></p><p>Explores ML algorithms, data modeling, and applications in AI.</p><p><strong>Year 2</strong></p><h3><strong>First Semester</strong></h3><p><a href="https://windy.provusdemo.com/academics/master-science-information-technology/cloud-computing"><strong>Cloud Computing</strong></a></p><p>Introduction to cloud architectures, virtualization, and cloud service models.</p><h3><strong>Second Semester</strong></h3><p><a href="https://windy.provusdemo.com/academics/master-science-information-technology/it-project-management"><strong>IT Project Management</strong></a></p><p>Covers project planning, execution, and risk management in IT environments.</p><p>&nbsp;</p>'
