      uuid: 1128763f-32a9-477c-9f9e-4adc2045db9f
      component_id: sdc.provus_base_theme.paragraph
      inputs:
        text:
          value: '<p>At Windy City Community College, we’re more than just a place to learn—we’re a community dedicated to your success. Whether you’re pursuing a degree, earning a certification, or exploring a new passion, you’ll find the resources, support, and opportunities you need to thrive.</p><p>Our innovative programs are designed to fit your life, with flexible schedules, online and hybrid options, and personalized support every step of the way. Join a diverse and inclusive campus where students of all backgrounds come together to achieve their goals, build meaningful connections, and create a brighter future.</p><p>Discover what’s possible at Windy City Community College. Your journey starts here!</p>'
          format: canvas_html_block
