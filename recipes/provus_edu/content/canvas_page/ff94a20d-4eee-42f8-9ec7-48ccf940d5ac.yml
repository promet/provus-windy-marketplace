        text:
          value: '<p>At Windy City Community College, we’re committed to helping you achieve your dreams. With over 100 affordable programs, flexible class schedules, and a supportive community, we provide the tools and opportunities you need to thrive. Whether you''re starting your academic journey, advancing your career, or exploring new interests, Windy City Community College is the perfect place to begin. Join us and take the first step toward a brighter future!</p><p><a href="https://windy.provusdemo.com/admissions"><strong>HOW TO APPLY</strong></a></p><p><a href="https://windy.provusdemo.com/admissions"><strong>FINANCIAL AID OPTIONS</strong></a></p><p><a href="https://windy.provusdemo.com/contact"><strong>SCHEDULE A TOUR</strong></a></p>'
