$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: Google Map
description: Responsive Google Maps embed component with aspect ratio, rounding, and spacing controls.
status: stable
group: Provus Components

variants:
  default:
    title: Default
    description: Responsive Google Maps embed with optional caption and Bootstrap spacing classes

props:
  type: object
  required:
    - title
    - embed_url
  properties:
    title:
      type: string
      title: Title
      description: Accessible title for the embedded map iframe.
      examples:
        - Main campus map
    embed_url:
      type: string
      format: uri
      title: Embed URL
      description: Full Google Maps embed URL.
      examples:
        - 'https://www.google.com/maps/embed?pb=!1m18...'
    size:
      title: Aspect ratio
      description: Sets the container proportions using Bootstrap ratio classes.
      type: string
      enum:
        - 16:9
        - 4:3
        - 1:1
      meta:enum:
        16:9: "16:9 Widescreen"
        4:3: "4:3 Standard"
        1:1: "1:1 Square"
      default: "16:9"
      examples:
        - "16:9"
    width_class:
      type: string
      title: Width
      description: Bootstrap width utility class for the map container.
      default: w-100
      enum:
        - w-25
        - w-50
        - w-75
        - w-100
        - w-auto
        - mw-100
      meta:enum:
        w-25: "W-25"
        w-50: "W-50"
        w-75: "W-75"
        w-100: "W-100"
        w-auto: "W-auto"
        mw-100: "Mw-100"
    radius:
      type: string
      title: Corner radius
      description: Applies Bootstrap rounded corner classes to the map container.
      default: rounded-0
      enum:
        - rounded-0
        - small
        - large
        - extra-large
      meta:enum:
        rounded-0: Not rounded
        small: "Small (rounded-1)"
        large: "Large (rounded-3)"
        extra-large: "Extra Large (rounded-4)"
      examples:
        - rounded-0
    loading:
      type: string
      title: Loading behavior
      description: Controls when the iframe should load.
      default: lazy
      enum:
        - lazy
        - eager
      meta:enum:
        lazy: Lazy
        eager: Eager
    allow_fullscreen:
      type: boolean
      title: Allow fullscreen
      description: Allows the embedded map to enter fullscreen mode.
      default: true
    caption:
      title: Caption
      description: Optional text displayed below the map.
      type: string
      contentMediaType: text/html
      x-formatting-context: block
    margin_all:
      type: string
      title: Margin
      description: Bootstrap margin class for the figure.
      default: m-0
      enum:
        - m-0
        - m-1
        - m-2
        - m-3
        - m-4
        - m-5
      meta:enum:
        m-0: "M-0"
        m-1: "M-1"
        m-2: "M-2"
        m-3: "M-3"
        m-4: "M-4"
        m-5: "M-5"
    margin_top:
      type: string
      title: Margin top
      description: Bootstrap margin-top class for the figure.
      default: mt-0
      enum:
        - mt-0
        - mt-1
        - mt-2
        - mt-3
        - mt-4
        - mt-5
      meta:enum:
        mt-0: "Mt-0"
        mt-1: "Mt-1"
        mt-2: "Mt-2"
        mt-3: "Mt-3"
        mt-4: "Mt-4"
        mt-5: "Mt-5"
    margin_bottom:
      type: string
      title: Margin bottom
      description: Bootstrap margin-bottom class for the figure.
      default: mb-0
      enum:
        - mb-0
        - mb-1
        - mb-2
        - mb-3
        - mb-4
        - mb-5
      meta:enum:
        mb-0: "Mb-0"
        mb-1: "Mb-1"
        mb-2: "Mb-2"
        mb-3: "Mb-3"
        mb-4: "Mb-4"
        mb-5: "Mb-5"
    margin_start:
      type: string
      title: Margin start
      description: Bootstrap margin-start class for the figure.
      default: ms-0
      enum:
        - ms-0
        - ms-1
        - ms-2
        - ms-3
        - ms-4
        - ms-5
      meta:enum:
        ms-0: "Ms-0"
        ms-1: "Ms-1"
        ms-2: "Ms-2"
        ms-3: "Ms-3"
        ms-4: "Ms-4"
        ms-5: "Ms-5"
    margin_end:
      type: string
      title: Margin end
      description: Bootstrap margin-end class for the figure.
      default: me-0
      enum:
        - me-0
        - me-1
        - me-2
        - me-3
        - me-4
        - me-5
      meta:enum:
        me-0: "Me-0"
        me-1: "Me-1"
        me-2: "Me-2"
        me-3: "Me-3"
        me-4: "Me-4"
        me-5: "Me-5"
    padding_all:
