      enum:
        - pb-0
        - pb-1
        - pb-2
        - pb-3
        - pb-4
        - pb-5
      meta:enum:
        pb-0: "Pb-0"
        pb-1: "Pb-1"
        pb-2: "Pb-2"
        pb-3: "Pb-3"
        pb-4: "Pb-4"
        pb-5: "Pb-5"
    padding_start:
      type: string
