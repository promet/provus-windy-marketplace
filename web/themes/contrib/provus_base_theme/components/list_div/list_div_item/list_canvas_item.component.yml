$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: List (Div) Item
status: stable
description: Individual list item component with icon, title, body content, and optional link
group: Provus Components

variants:
  default:
    title: Default
    description: Standard list item with icon, title and optional body content

props:
  type: object
  required:
    - title
    - icon
  properties:
    title:
      type: string
      title: 'Title'
      description: 'List item title displayed as the main text'
      examples:
        - 'Key Features'
      default: ''
    body:
      type: string
      contentMediaType: text/html
      x-formatting-context: block
      title: 'Body'
      description: 'Optional body text displayed below the title. Supports multiple lines of text. Line breaks will be preserved in the display.'
      examples:
        - |
          <p>Detailed description of the list item.</p>
          <p>More information can be added here.</p>
      default: ''
    icon:
      type: object
      $ref: json-schema-definitions://canvas.module/image
      title: 'Image'
      description: 'Main image displayed at the top of the card'
      examples:
        - src: 'https://placehold.co/64x64'
          alt: 'Icon'
          width: 64
          height: 64
    link:
      type: string
      format: uri-reference
      title: 'Link URL'
      description: 'URL for the link button'
      examples:
        - '/contact'
