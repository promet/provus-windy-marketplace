$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: One Column
description: A Bootstrap row with one predefined column slot.
type: component
status: experimental
group: Provus Layouts

props:
  type: object
  properties:
    gap:
      type: string
      title: Gap
      description: Bootstrap gap utility for the row.
      enum:
        - g-0
        - g-1
        - g-2
        - g-3
        - g-4
        - g-5
      meta:enum:
        g-0: "G-0"
        g-1: "G-1"
        g-2: "G-2"
        g-3: "G-3"
        g-4: "G-4"
        g-5: "G-5"

slots:
  column_1:
    title: Column 1
    description: Column content

