$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Two Column
description: A Bootstrap row with two predefined column slots.
type: component
status: experimental
group: Provus Layouts

props:
  type: object
  required:
    - desktop_width
    - tablet_width
    - mobile_width
  properties:
    desktop_width:
      type: string
      title: Desktop column width
      description: Desktop column width.
      enum:
        - 50-50
        - 66-33
        - 33-66
        - 75-25
        - 25-75
      meta:enum:
        50-50: "50%/50%"
        66-33: "66%/33%"
        33-66: "33%/66%"
        75-25: "75%/25%"
        25-75: "25%/75%"
      default: 50-50
      examples:
        - "50-50"
    tablet_width:
      type: string
      title: Tablet column width
      description: Tablet column width.
      enum:
        - 50-50
        - 66-33
        - 33-66
        - 75-25
        - 25-75
      meta:enum:
        50-50: "50%/50%"
        66-33: "66%/33%"
        33-66: "33%/66%"
        75-25: "75%/25%"
        25-75: "25%/75%"
      default: 50-50
      examples:
        - "50-50"
    mobile_width:
      type: string
      title: Mobile column width
      description: Mobile column width.
      enum:
        - 50-50
        - 66-33
        - 33-66
        - 75-25
        - 25-75
        - 100-100
      meta:enum:
        50-50: "50%/50%"
        66-33: "66%/33%"
        33-66: "33%/66%"
        75-25: "75%/25%"
        25-75: "25%/75%"
        100-0: "100%/0%"
      default: 100-100
      examples:
        - "100-100"
    gap:
      type: string
      title: Gap between columns
      description: Bootstrap gap utility for the row.
      enum:
        - g-0
        - g-1
        - g-2
        - g-3
        - g-4
        - g-5
      meta:enum:
        g-0: "G-0"
        g-1: "G-1"
        g-2: "G-2"
        g-3: "G-3"
        g-4: "G-4"
        g-5: "G-5"

slots:
  column_1:
    title: Column 1
    description: First column content
  column_2:
    title: Column 2
    description: Second column content
