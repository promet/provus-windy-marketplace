$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Event Mini View
status: stable
description: Mini event component displaying event title, dates, URL, and optional body content
group: Provus Components

variants:
  default:
    title: Default
    description: Standard mini event display with title, dates, and URL

props:
  type: object
  required:
    - start_date
    - end_date
    - url
    - event_title
    - full_dates
  properties:
    start_date:
      type: string
      title: Month
      description: Month of the event
      examples:
        - 'JAN'
      default: ''
    end_date:
      type: string
      title: Day
      description: Day of the event
      examples:
        - '01'
      default: ''
    full_dates:
      type: string
      title: Time
      description: All the dates of the event
      examples:
        - '10am to 8pm'
      default: ''
    url:
      type: string
      format: uri-reference
      title: 'Link URL'
      description: 'URL for the link button'
      examples:
        - '/events/annual-conference-2024'
      default: ''
    event_title:
      type: string
      title: Event title
      description: Event title
      examples:
        - 'Annual Conference 2024'
      default: ''
    body:
      type: string
      contentMediaType: text/html
      x-formatting-context: block
      title: Body
      description: Summary of the event
      examples:
        - 'Join us for an exciting event featuring keynote speakers and networking opportunities.'
      default: ''
