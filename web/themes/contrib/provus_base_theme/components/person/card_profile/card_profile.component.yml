$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Person Mini Profile Card
status: stable
description: Person card component displaying name, job title, image, URL, phone, and optional content attributes
group: Provus Components

variants:
  default:
    title: Default
    description: Standard person card with name, job title, image, and contact information

props:
  type: object
  required:
    - first_name
    - last_name
    - url
    - image_url
  properties:
    first_name:
      type: string
      title: First Name
      description: First name of the person
      examples:
        - 'John'
      default: ''
    last_name:
      type: string
      title: Last Name
      description: Last name of the person
      examples:
        - 'Doe'
      default: ''
    job_title:
      type: string
      title: Job title
      description: Job title
      examples:
        - 'CEO'
        - 'Marketing Director'
        - 'Senior Developer'
      default: ''
    image_url:
      type: object
      $ref: json-schema-definitions://canvas.module/image
      title: 'Image'
      description: 'Person image displayed with the profile'
      examples:
        - src: 'https://placehold.co/280x448'
          alt: 'Image'
      default: ''
    url:
      type: string
      format: uri-reference
      title: 'URL'
      description: 'URL for the link to the person profile'
      examples:
        - '/people/john-doe'
      default: ''
    phone:
      type: string
      title: Phone number
      description: Phone number
      examples:
        - '(555) 123-4567'
      default: ''
    content_attributes:
      type: string
      title: 'Content attributes'
      description: 'Drupal template function placeholder — no content is required here. Please leave this section blank.'
      default: ''
