$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: Button
description: Button component with variant, outline, and size options.
status: stable
group: Provus Components

variants:
  default:
    title: Default
    description: Standard accordion item with collapsible content section

props:
  type: object
  required:
    - text
    - url
  properties:
    text:
      type: string
      title: Button text
      description: The text displayed inside the button
      examples:
        - Click me
    url:
      type: string
      format: uri-reference
      title: 'URL'
      description: 'URL for the link button'
      examples:
        - '/contact'
      default: ''
    variant:
      type: string
      title: Style variant
      description: Bootstrap button variant
      default: primary
      enum:
        - default
        - primary
        - secondary
      meta:enum:
        default: Default
        primary: Primary
        secondary: Secondary
      examples:
        - primary
    id:
      type: string
      title: ID
      description: HTML id attribute for the button element
      examples:
        - my-button
    size:
      type: string
      title: Size
      description: Button size
      default: normal
      enum:
        - small
        - normal
        - large
      meta:enum:
        small: Small
        normal: Normal
        large: Large
      examples:
        - normal
    width:
      type: string
      title: Width
      description: Button width
      default: auto
      enum:
        - auto
        - full
      meta:enum:
        auto: Auto
        full: Full
      examples:
        - auto
    wrapper:
      title: Wrapper
      description: Wrap the button in a span or div
      type: string
      default: ''
      enum:
        - span
        - div
      meta:enum:
        span: Span
        div: Div
    alignment:
      type: string
      title: 'Alignment'
      description: 'Align the heading'
      default: 'left'
      enum:
        - 'left'
        - 'center'
        - 'right'
      meta:enum:
        left: Left
        center: Center
        right: Right

libraryOverrides:
  css:
    component:
      button.css: {}
