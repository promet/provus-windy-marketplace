$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: List (li) Wrapper
status: stable
description: A configurable list style with optional icon position and orientation.
group: Provus Components

variants:
  default:
    title: Default
    description: Standard list with configurable style and display options

props:
  type: object
  required:
    - list_style
  properties:
    list_style:
      type: string
      title: List Style
      description: The style of the list
      enum:
        - none
        - circle
        - square
        - decimal
        - lower-roman
        - upper-roman
        - lower-alpha
        - upper-alpha
      examples:
        - circle
      default: circle
    additional_classes:
      type: string
      title: Additional classes
      description: Additional classes to add to the list
      examples:
        - 'list-unstyled'

slots:
  list_items:
    title: Items
    description: List item components placed inside the list container

libraryOverrides:
  css:
    component:
      list_style.css: {}