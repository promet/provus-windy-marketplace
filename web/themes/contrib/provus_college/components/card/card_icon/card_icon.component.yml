$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: Card Icon
status: stable
description: Card component with icon image, title, body content, and optional additional content
group: Provus Components

variants:
  default:
    title: Default
    description: Standard icon card with image, title and body content

props:
  type: object
  required:
    - title
  properties:
    title:
      type: string
      title: 'Title'
      description: 'Main card title displayed as a heading'
      examples:
        - 'Our Services'
        - 'Key Features'
        - 'About Us'
      default: ''
    body:
      type: string
      contentMediaType: text/html
      x-formatting-context: block
      title: 'Main Content'
      description: 'Main content text displayed in the card body. Supports multiple lines of text. Line breaks will be preserved in the display.'
      examples:
        - 'We provide exceptional services to help your business grow and succeed.'
        - |
          Our team of experts is dedicated to delivering high-quality solutions.
          
          Contact us today to learn more.
      default: ''
    image_url:
      type: object
      $ref: json-schema-definitions://canvas.module/image
      title: 'Icon or Image URL'
      description: 'Icon or image displayed in the card'
      examples:
        - src: 'https://placehold.co/400x300'
          alt: 'Card placeholder image'
      default: ''
    link_text:
      type: string
      title: 'Link Text'
      description: 'Link button displayed in the card'
      examples:
        - 'Action Button'
      default: ''
    link_url:
      type: string
      format: uri-reference
      title: 'Link URL'
      description: 'URL for the link button'
      examples:
        - '/contact'
      default: ''
    link_style:
      type: string
      enum:
        - default
        - primary
        - secondary
      meta:enum:
        default: Default
        primary: Primary
        secondary: Secondary
      title: 'Link Style'
      description: 'Style of the link button'
      default: 'default'
      examples:
        - 'default'
    more_content:
      type: string
      contentMediaType: text/html
      x-formatting-context: block
      title: 'Footer Content'
      description: 'Additional content section displayed below the main body text. Supports HTML markup for rich content (lists, links, formatted text, etc.). HTML will be rendered as-is.'
      examples:
        - '<p>Additional information or <a href="#">call-to-action content</a>.</p>'
      default: ''
