$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Three Column
description: A Bootstrap row with three predefined column slots.
type: component
status: experimental
group: Provus Layouts

props:
  type: object
  properties:
    gap:
      type: string
      title: Gap
      description: Bootstrap gap utility for the row.
      enum:
        - g-0
        - g-1
        - g-2
        - g-3
        - g-4
        - g-5
      meta:enum:
        g-0: "G-0"
        g-1: "G-1"
        g-2: "G-2"
        g-3: "G-3"
        g-4: "G-4"
        g-5: "G-5"

slots:
  column_1:
    title: Column 1
    description: First column content
  column_2:
    title: Column 2
    description: Second column content
  column_3:
    title: Column 3
    description: Third column content

canvas_bootstrap:
  ui_groups:
    Gaps:
      weight: 10
      groups:
        All gaps:
          weight: 0
          fields:
            - gap
