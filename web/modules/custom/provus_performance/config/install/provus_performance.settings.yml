enabled: true
content_anchors:
  - '<main'
  - 'role="main"'
  - 'id="main-content"'
  - 'class="canvas'
  - 'class="region-hero'
  - 'class="hero'
skip_selectors:
  - 'data:'
  - 'class="logo'
  - 'id="logo'
  - 'sprite'
  - 'icon-'
  - '/favicon'
font_preloads: {  }
preconnect_urls:
  - 'https://fonts.googleapis.com'
  - 'https://fonts.gstatic.com crossorigin'
excluded_paths:
  - '/admin/*'
  - '/user/*'
  - '/node/add/*'
  - '/node/*/edit'
  - '/node/*/revisions/*'
  - '/batch*'
  - '/system/*'
set_fetchpriority: true
remove_lazy: true
async_stylesheets: true
defer_scripts: true
script_strategy: defer
inline_critical_css: ''
critical_css_patterns: {  }
critical_js_patterns: {  }
