provus_performance.settings:
  type: config_object
  label: 'Provus Performance settings'
  mapping:
    enabled:
      type: boolean
      label: 'Enable LCP optimization'
    content_anchors:
      type: sequence
      label: 'HTML anchors used to locate the main content start'
      sequence:
        type: string
        label: 'Anchor'
    skip_selectors:
      type: sequence
      label: 'Substrings that disqualify an <img> from being treated as LCP (matched on the tag text)'
      sequence:
        type: string
        label: 'Substring'
    font_preloads:
      type: sequence
      label: 'Font URLs to preload'
      sequence:
        type: string
        label: 'URL'
    excluded_paths:
      type: sequence
      label: 'Paths (wildcards allowed) where optimization is disabled'
      sequence:
        type: string
        label: 'Path'
    set_fetchpriority:
      type: boolean
      label: 'Set fetchpriority="high" on the LCP image'
    remove_lazy:
      type: boolean
      label: 'Remove loading="lazy" from the LCP image'
    async_stylesheets:
      type: boolean
      label: 'Load non-critical stylesheets asynchronously (preload-swap pattern)'
    defer_scripts:
      type: boolean
      label: 'Add defer/async to non-critical external scripts in <head>'
    script_strategy:
      type: string
      label: 'Loading strategy applied to non-critical scripts ("defer" or "async")'
    inline_critical_css:
      type: string
      label: 'CSS inlined in a <style> element at the top of <head>'
    critical_css_patterns:
      type: sequence
      label: 'Substrings that mark a <link rel="stylesheet"> as critical and exempt from async loading'
      sequence:
        type: string
        label: 'Substring'
    critical_js_patterns:
      type: sequence
      label: 'Substrings that mark a <script> as critical and exempt from defer/async'
      sequence:
        type: string
        label: 'Substring'
